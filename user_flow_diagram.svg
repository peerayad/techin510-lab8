<svg width="680" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Kevin's Makerspace Purchasing App — User Flow Diagram</title>
<desc>Flowchart showing Kevin's three paths through the app: Dashboard, Purchases, and Agent, with risk labels at failure points</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
text { font-family: Arial, sans-serif; fill: #222; }
.th { font-size: 14px; font-weight: 600; }
.ts { font-size: 12px; fill: #555; }
.arr { stroke: #888; stroke-width: 1.2; fill: none; }
.box-gray { fill: #f0eeea; stroke: #aaa; }
.box-purple { fill: #eeedfe; stroke: #9490d8; }
.box-teal { fill: #e1f5ee; stroke: #1d9e75; }
.box-amber { fill: #faeeda; stroke: #ba7517; }
.box-red { fill: #fcebeb; stroke: #e24b4a; }
.box-legend { fill: #f8f7f3; stroke: #ccc; }
</style>

<!-- START -->
<rect x="240" y="20" width="200" height="44" rx="22" class="box-gray" stroke-width="0.8"/>
<text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Kevin's goal</text>
<text class="ts" x="340" y="75" text-anchor="middle">Understand purchasing data</text>
<line x1="340" y1="80" x2="340" y2="108" class="arr" marker-end="url(#arrow)"/>

<!-- SIDEBAR NAV -->
<rect x="200" y="108" width="280" height="52" rx="8" class="box-purple" stroke-width="0.8"/>
<text class="th" x="340" y="128" text-anchor="middle" dominant-baseline="central">Open app → sidebar nav</text>
<text class="ts" x="340" y="148" text-anchor="middle" dominant-baseline="central">Dashboard / Purchases / Agent</text>

<!-- Branch lines -->
<line x1="230" y1="160" x2="100" y2="220" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="160" x2="340" y2="220" class="arr" marker-end="url(#arrow)"/>
<line x1="450" y1="160" x2="580" y2="220" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="130" y="200" text-anchor="middle">Dashboard</text>
<text class="ts" x="340" y="200" text-anchor="middle">Purchases</text>
<text class="ts" x="550" y="200" text-anchor="middle">Agent</text>

<!-- DASHBOARD COLUMN -->
<rect x="20" y="220" width="160" height="52" rx="8" class="box-teal" stroke-width="0.8"/>
<text class="th" x="100" y="240" text-anchor="middle" dominant-baseline="central">Dashboard loads</text>
<text class="ts" x="100" y="258" text-anchor="middle" dominant-baseline="central">Fetch from Supabase</text>
<line x1="100" y1="272" x2="100" y2="316" class="arr" marker-end="url(#arrow)"/>

<rect x="20" y="316" width="160" height="52" rx="8" class="box-amber" stroke-width="0.8"/>
<text class="th" x="100" y="336" text-anchor="middle" dominant-baseline="central" fill="#854F0B">DB empty?</text>
<text class="ts" x="100" y="354" text-anchor="middle" dominant-baseline="central" fill="#854F0B">⚠ ERROR</text>
<line x1="100" y1="368" x2="100" y2="412" class="arr" marker-end="url(#arrow)"/>

<rect x="20" y="412" width="160" height="52" rx="8" class="box-teal" stroke-width="0.8"/>
<text class="th" x="100" y="432" text-anchor="middle" dominant-baseline="central">Charts render</text>
<text class="ts" x="100" y="450" text-anchor="middle" dominant-baseline="central">Spend by area + trend</text>

<!-- PURCHASES COLUMN -->
<rect x="260" y="220" width="160" height="52" rx="8" class="box-teal" stroke-width="0.8"/>
<text class="th" x="340" y="240" text-anchor="middle" dominant-baseline="central">Purchases page</text>
<text class="ts" x="340" y="258" text-anchor="middle" dominant-baseline="central">Filter + view table</text>
<line x1="340" y1="272" x2="340" y2="316" class="arr" marker-end="url(#arrow)"/>

<rect x="260" y="316" width="160" height="52" rx="8" class="box-teal" stroke-width="0.8"/>
<text class="th" x="340" y="336" text-anchor="middle" dominant-baseline="central">Upload CSV</text>
<text class="ts" x="340" y="354" text-anchor="middle" dominant-baseline="central">or add single row</text>
<line x1="340" y1="368" x2="340" y2="412" class="arr" marker-end="url(#arrow)"/>

<rect x="260" y="412" width="160" height="52" rx="8" class="box-amber" stroke-width="0.8"/>
<text class="th" x="340" y="432" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Validate schema</text>
<text class="ts" x="340" y="450" text-anchor="middle" dominant-baseline="central" fill="#854F0B">⚠ ERROR bad data</text>
<line x1="340" y1="464" x2="340" y2="508" class="arr" marker-end="url(#arrow)"/>

<rect x="260" y="508" width="160" height="52" rx="8" class="box-teal" stroke-width="0.8"/>
<text class="th" x="340" y="528" text-anchor="middle" dominant-baseline="central">Save to Supabase</text>
<text class="ts" x="340" y="546" text-anchor="middle" dominant-baseline="central">Success message</text>

<!-- AGENT COLUMN -->
<rect x="500" y="220" width="160" height="52" rx="8" class="box-teal" stroke-width="0.8"/>
<text class="th" x="580" y="240" text-anchor="middle" dominant-baseline="central">Agent page</text>
<text class="ts" x="580" y="258" text-anchor="middle" dominant-baseline="central">Chat interface</text>
<line x1="580" y1="272" x2="580" y2="316" class="arr" marker-end="url(#arrow)"/>

<rect x="500" y="316" width="160" height="52" rx="8" class="box-teal" stroke-width="0.8"/>
<text class="th" x="580" y="336" text-anchor="middle" dominant-baseline="central">Kevin asks question</text>
<text class="ts" x="580" y="354" text-anchor="middle" dominant-baseline="central">Natural language</text>
<line x1="580" y1="368" x2="580" y2="412" class="arr" marker-end="url(#arrow)"/>

<rect x="500" y="412" width="160" height="52" rx="8" class="box-teal" stroke-width="0.8"/>
<text class="th" x="580" y="432" text-anchor="middle" dominant-baseline="central">Fetch Supabase data</text>
<text class="ts" x="580" y="450" text-anchor="middle" dominant-baseline="central">All purchases as context</text>
<line x1="580" y1="464" x2="580" y2="508" class="arr" marker-end="url(#arrow)"/>

<rect x="500" y="508" width="160" height="52" rx="8" class="box-red" stroke-width="0.8"/>
<text class="th" x="580" y="528" text-anchor="middle" dominant-baseline="central" fill="#a32d2d">LLM generates answer</text>
<text class="ts" x="580" y="546" text-anchor="middle" dominant-baseline="central" fill="#a32d2d">⚠ HALLUCINATION</text>
<line x1="580" y1="560" x2="580" y2="604" class="arr" marker-end="url(#arrow)"/>

<rect x="500" y="604" width="160" height="52" rx="8" class="box-red" stroke-width="0.8"/>
<text class="th" x="580" y="624" text-anchor="middle" dominant-baseline="central" fill="#a32d2d">Guardrail check</text>
<text class="ts" x="580" y="642" text-anchor="middle" dominant-baseline="central" fill="#a32d2d">⚠ UNSAFE / INFO LEAK</text>
<line x1="580" y1="656" x2="580" y2="700" class="arr" marker-end="url(#arrow)"/>

<rect x="500" y="700" width="160" height="52" rx="8" class="box-teal" stroke-width="0.8"/>
<text class="th" x="580" y="720" text-anchor="middle" dominant-baseline="central">Response shown</text>
<text class="ts" x="580" y="738" text-anchor="middle" dominant-baseline="central">Grounded in data</text>

<!-- Converge to END -->
<line x1="100" y1="464" x2="100" y2="800" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="560" x2="340" y2="800" class="arr" marker-end="url(#arrow)"/>
<line x1="580" y1="752" x2="580" y2="800" class="arr" marker-end="url(#arrow)"/>
<line x1="100" y1="800" x2="580" y2="800" stroke="#aaa" stroke-width="0.5"/>

<rect x="240" y="800" width="200" height="44" rx="22" class="box-gray" stroke-width="0.8"/>
<text class="th" x="340" y="822" text-anchor="middle" dominant-baseline="central">Kevin gets insight</text>

<!-- LEGEND -->
<rect x="20" y="660" width="210" height="110" rx="8" class="box-legend" stroke-width="0.8"/>
<text class="th" x="34" y="682" dominant-baseline="central">Risk legend</text>
<rect x="34" y="694" width="14" height="14" rx="3" class="box-amber" stroke-width="0.5"/>
<text class="ts" x="56" y="701" dominant-baseline="central">ERROR — app or data failure</text>
<rect x="34" y="716" width="14" height="14" rx="3" class="box-red" stroke-width="0.5"/>
<text class="ts" x="56" y="723" dominant-baseline="central">HALLUCINATION — wrong answer</text>
<rect x="34" y="738" width="14" height="14" rx="3" class="box-red" stroke-width="0.5"/>
<text class="ts" x="56" y="745" dominant-baseline="central">UNSAFE / INFO LEAK</text>
</svg>
